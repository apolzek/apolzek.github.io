- text: "MTU problems are silent. The connection works fine for small packets and only breaks when something large needs to pass through, which makes them so hard to diagnose." 
  date: "2026-05-17"
- text: "In the contrib Collector, the more components you add to your pipeline, the harder it gets to guarantee execution predictability. Every new combination, and every version bump, is one more variable that can change the behavior of a pipeline that used to work."
  date: "2026-05-22"
