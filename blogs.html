---
layout: default
title: blogs
permalink: /blogs/
---
<section class="blogs-page">
  <div class="flex-row-between">
    <a href="{{ site.url }}{{ site.baseurl }}/"><i class="fa fa-chevron-circle-left" aria-hidden="true"></i> home</a>
    <button title="Change theme" id="theme-toggle" onclick="modeSwitcher()">
      <div></div>
    </button>
  </div>

  <h2>Blogs</h2>
  <p class="blogs-subtitle">blogs and writers i follow</p>

  <ul class="blogs-list">
    {% for blog in site.data.blogs %}
    <li class="blog-item">
      <a href="{{ blog.url }}" target="_blank" rel="noopener noreferrer" class="blog-link">{{ blog.name }}</a>
    </li>
    {% endfor %}
  </ul>
</section>

<style>
  .blogs-page h2 {
    margin-top: 2rem;
    margin-bottom: 0.2rem;
  }

  .blogs-subtitle {
    color: var(--link-color);
    font-size: 0.85em;
    margin-bottom: 2rem;
    font-style: italic;
  }

  .blogs-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .blog-item {
    padding: 0.1rem 0;
  }

  .blog-link {
    font-size: 0.95rem;
    text-decoration: none;
    color: inherit;
    transition: color 0.2s;
  }

  .blog-link::before {
    content: "> ";
    color: var(--link-color);
    font-weight: bold;
  }

  .blog-link:hover {
    color: var(--link-color);
  }
</style>
